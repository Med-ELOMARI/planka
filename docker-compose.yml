services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: planka
      POSTGRES_USER: planka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U planka -d planka" ]
      interval: 5s
      timeout: 5s
      retries: 10

  planka:
    image: ghcr.io/med-elomari/atlasimex-office:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      DATABASE_URL: postgres://planka:${POSTGRES_PASSWORD}@postgres/planka
      SECRET_KEY: ${SECRET_KEY}
      TRUST_PROXY: "1"

      S3_ENDPOINT: https://s3.us-east-1.amazonaws.com
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}

      MAILER_ENABLED: ${MAILER_ENABLED}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TLS: ${SMTP_TLS}

volumes:
  postgres_data:
