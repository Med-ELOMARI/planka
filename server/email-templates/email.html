<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{subject}}</title>
</head>

<body
  style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background-color:#f4f5f7;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;">
          <!-- Header -->
          <tr>
            <td style="background-color:#3a2c69;padding:24px 32px;border-radius:8px 8px 0 0;text-align:center;">
              <a href="{{baseUrl}}" style="text-decoration:none;display:inline-block;">
                <img src="https://www.atlasimex.es/images/logo/logo-white.svg" alt="Atlasimex Office" width="180"
                  style="display:block;height:auto;border:0;margin:0 auto;" />
              </a>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="background-color:#ffffff;padding:32px 32px 20px;">
              <p style="margin:0 0 24px;font-size:16px;color:#172b4d;line-height:1.5;">Hi
                <strong>{{recipientName}}</strong>,
              </p>
              {{body}}
              <p style="margin:28px 0 0;">
                <a href="{{cardUrl}}"
                  style="display:inline-block;padding:10px 24px;background-color:#3a2c69;color:#ffffff;border-radius:5px;text-decoration:none;font-size:14px;font-weight:600;line-height:1.4;">View
                  Card</a>
              </p>
            </td>
          </tr>
          <!-- Breadcrumb -->
          <tr>
            <td style="background-color:#ffffff;padding:16px 32px 28px;border-bottom:1px solid #ebecf0;">
              <p style="margin:0;font-size:12px;color:#97a0af;">{{breadcrumb}}</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f4f5f7;padding:16px 32px;border-radius:0 0 8px 8px;">
              <p style="margin:0;font-size:12px;color:#97a0af;text-align:center;">You are receiving this email because
                you are a member of <strong style="color:#3a2c69;">{{projectName}}</strong>.<br>Sent from <a
                  href="{{baseUrl}}" style="color:#3a2c69;text-decoration:none;">Atlasimex Office</a>. &nbsp;·&nbsp;
                <em>Do not reply to this email.</em></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
