services:
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  postgres:
    image: postgres:16-alpine
    restart: on-failure
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=planka
      - POSTGRES_DB=planka
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U planka -d planka && psql -U planka -d planka -c 'SELECT 1'" ]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  planka-server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    image: planka-server-dev
    pull_policy: never
    command: [ "bash", "-c", "npm run db:init && npm start" ]
    restart: on-failure
    volumes:
      - ./server:/app
      - server-node_modules:/app/node_modules
    ports:
      - 1337:1337
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      BASE_URL: http://localhost:1337
      DATABASE_URL: postgres://planka:${POSTGRES_PASSWORD}@postgres/planka
      SECRET_KEY: ${SECRET_KEY}
      TRUST_PROXY: "1"
      # Admin user
      DEFAULT_ADMIN_EMAIL: demo@demo.demo
      DEFAULT_ADMIN_PASSWORD: demo
      DEFAULT_ADMIN_NAME: Demo Demo
      DEFAULT_ADMIN_USERNAME: demo
      # SMTP
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_TLS_REJECT_UNAUTHORIZED: "false"
      SMTP_FROM: noreply@atlasimex.local

  planka-client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    image: planka-client-dev
    pull_policy: never
    command: [ "bash", "-c", "npm start" ]
    restart: on-failure
    volumes:
      - ./client:/app
      - client-node_modules:/app/node_modules
    ports:
      - 3000:3000
    environment:
      - PROXY_TARGET=http://planka-server:1337
      - VITE_SERVER_URL=http://localhost:1337

volumes:
  db-data:
  server-node_modules:
  client-node_modules:
